version: '3.8'

services:
  # FastAPI Backend Service
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: conscience-fastapi
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://conscience_user:secure_password_123@postgres:5432/conscience_db
      WEAVIATE_URL: http://weaviate:8080
      WEAVIATE_API_KEY: ${WEAVIATE_API_KEY}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: "true"
    ports:
      - "${API_PORT}:8000"
    networks:
      - conscience-network
    depends_on:
      - postgres
      - weaviate
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./backend:/app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PostgreSQL - Structured Relational Database
  postgres:
    image: postgres:15-alpine
    container_name: conscience-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: conscience_db
      POSTGRES_USER: conscience_user
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - conscience-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conscience_user -d conscience_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Weaviate - Vector Database for Semantic Search
  weaviate:
    image: semitechnologies/weaviate:1.24.4
    container_name: conscience-weaviate
    restart: unless-stopped
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'false'
      AUTHENTICATION_APIKEY_ENABLED: 'true'
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEY}
      AUTHENTICATION_APIKEY_USERS: ${WEAVIATE_API_KEY_USER}:${WEAVIATE_API_KEY}
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: 'text2vec-transformers'
      TRANSFORMERS_INFERENCE_API: http://text2vec-transformers:8080
      CLUSTER_HOSTNAME: 'node1'
    volumes:
      - weaviate_data:/var/lib/weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    networks:
      - conscience-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      - text2vec-transformers
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Text2Vec Transformers - Embedding Service
  text2vec-transformers:
    image: semitechnologies/text2vec-transformers:huggingface
    container_name: conscience-embeddings
    restart: unless-stopped
    environment:
      ENABLE_CUDA: '0'
      NVIDIA_VISIBLE_DEVICES: ''
    networks:
      - conscience-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx - HTTPS Reverse Proxy (Production Ready)
  nginx:
    image: nginx:alpine
    container_name: conscience-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - conscience-network
    depends_on:
      - fastapi
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  weaviate_data:
    driver: local

networks:
  conscience-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
